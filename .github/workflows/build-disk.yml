---
name: Build disk images

# DISABLED: this workflow does not work against our base image.
#
# bootc-image-builder runs DNF depsolve inside its own container
# (quay.io/centos-bootc/bootc-image-builder), then tries to read the
# `file:///etc/pki/rpm-gpg/...` keys referenced in the *target* image's
# repo configs. bib's container has its own /etc/pki/rpm-gpg and does NOT
# see the keys that exist inside our image, so any repo with file:// GPG
# key references fails depsolve. Bazzite base ships ~10 such repos
# (terra-mesa, terra-mesa-source, fedora-debuginfo, updates-archive, all
# the terra-* per-Fedora-version variants). All hit the same wall.
#
# Other issues we already worked around earlier in this file's history
# (missing iso.toml, kickstart pointing at upstream image, missing
# --rootfs btrfs flag, no nvidia variant) are still solved — but the
# depsolve issue would need either:
#   (a) pre-staging the image's GPG keys into bib's container at build
#       time, or
#   (b) stripping unreachable third-party repos from the image's
#       /etc/yum.repos.d/ just for the bib depsolve, leaving the
#       published image untouched, or
#   (c) abandoning the ublue-os/image-template's build-disk.yml
#       boilerplate (designed for minimal bootc bases) and adopting
#       whatever pipeline bazzite.gg uses to produce its own ISOs.
#
# All three are real engineering, not quick fixes. For our 3-machine
# fleet, the rebase-from-stock-Bazzite path (install-bazzite.sh in
# ReinstallScripts) already works and is well-validated. Disk-image
# building has no current value to justify the work.
#
# Triggers stripped to workflow_dispatch only — file kept for future
# revival if/when uBlue's bazzite-iso pipeline becomes easy to adopt.
# Run via `gh workflow run build-disk.yml` if you want to retry, but
# expect failures unless one of (a)/(b)/(c) above has been done first.

on:
  workflow_dispatch:
    inputs:
      upload-to-s3:
        description: "Upload to S3"
        required: false
        default: false
        type: boolean
      platform:
        required: false
        type: choice
        default: amd64
        options:
          - amd64
          - arm64

env:
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"  # do not edit
  DEFAULT_TAG: "latest"
  BIB_IMAGE: "quay.io/centos-bootc/bootc-image-builder:latest"
  # Schedule and PR runs don't have inputs.platform — default to amd64
  # (our hardware is x86_64; arm64 has to be requested via workflow_dispatch).
  PLATFORM: ${{ inputs.platform || 'amd64' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.image-name }} ${{ matrix.disk-type }}
    runs-on: ${{ (inputs.platform || 'amd64') == 'amd64' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    strategy:
      fail-fast: false
      matrix:
        image-name: ["bazzite-custom", "bazzite-nvidia-custom"]
        disk-type: ["qcow2", "anaconda-iso"]
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          USER_UID=$(id -u)
          USER_GID=$(id -g)
          DISK_TYPE=$(echo "${{ matrix.disk-type }}" | tr ' ' '-')
          # Lowercase the image uri
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${{ matrix.image-name }}" >> ${GITHUB_ENV}
          echo "DISK_TYPE=${DISK_TYPE}" >> ${GITHUB_ENV}
          echo "USER_UID=${USER_UID}" >> ${GITHUB_ENV}
          echo "USER_GID=${USER_GID}" >> ${GITHUB_ENV}

      - name: Install dependencies
        if: env.PLATFORM == 'arm64'
        run: |
          set -x
          sudo apt update -y
          sudo apt install -y \
            podman

      - name: Maximize build space
        if: env.PLATFORM != 'arm64'
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build disk images
        id: build
        uses: osbuild/bootc-image-builder-action@main
        with:
          builder-image: ${{ env.BIB_IMAGE }}
          # ISO build needs the per-image kickstart (sets bootc switch target);
          # qcow2 just needs the disk layout (shared across both variants).
          config-file: ${{ matrix.disk-type == 'anaconda-iso' && format('./disk_config/iso-{0}.toml', matrix.image-name) || './disk_config/disk.toml' }}
          image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          chown: ${{ env.USER_UID }}:${{ env.USER_GID }}
          types: ${{ matrix.disk-type }}
          # --rootfs btrfs because Bazzite base images do not ship a
          # /usr/lib/bootc/install/*.toml declaring root-fs-type, so bib
          # would otherwise fail with "missing required info: DefaultRootFs".
          # btrfs matches Bazzite's default. Long-term fix would be to bake
          # an install config into the image (build_files/build.sh), but
          # passing the flag here is fine and keeps the disk-build concern
          # in this workflow.
          additional-args: --use-librepo=True --rootfs btrfs

      - name: Upload disk images and Checksum to Job Artifacts
        if: inputs.upload-to-s3 != true && github.event_name != 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          # Per-leg artifact name — without this, parallel matrix legs would
          # all try to upload as the default name "artifact" and clobber each
          # other / fail the upload.
          name: ${{ matrix.image-name }}-${{ env.DISK_TYPE }}
          path: ${{ steps.build.outputs.output-directory }}
          if-no-files-found: error
          retention-days: 0
          compression-level: 0
          overwrite: true

      - name: Upload to S3
        if: inputs.upload-to-s3 == true && github.event_name != 'pull_request'
        shell: bash
        env:
          RCLONE_CONFIG_S3_TYPE: s3
          RCLONE_CONFIG_S3_PROVIDER: ${{ secrets.S3_PROVIDER }}
          RCLONE_CONFIG_S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          RCLONE_CONFIG_S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_S3_REGION: ${{ secrets.S3_REGION }}
          RCLONE_CONFIG_S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          SOURCE_DIR: ${{ steps.build.outputs.output-directory }}
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone
          # Subdir per-image so both variants don't collide on shared filenames
          # (e.g. install.iso, disk.qcow2).
          rclone copy $SOURCE_DIR S3:${{ secrets.S3_BUCKET_NAME }}/${{ env.IMAGE_NAME }}/
