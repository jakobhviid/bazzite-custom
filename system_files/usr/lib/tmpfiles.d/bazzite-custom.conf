# Declare /var-side state created by image-baked packages so bootc lint
# stops complaining about "content in /var missing tmpfiles.d entries".
# Without these, /var content from the image isn't reliably re-created on
# bootc upgrades that recreate /var (since /var is not part of the image
# layer like /usr is — it's runtime state).
#
# /var/lib/dnf — created by dnf during package install in the build,
# needed for any future runtime dnf operations (rare on atomic systems
# but harmless to declare).
d /var/lib/dnf 0755 root root - -

# /var/opt/vivaldi/media-codecs-7.9 — symlink Vivaldi's RPM creates as
# part of its codec layout. Brittle: the version "7.9" and target
# "git-2026-02-09" are tied to whatever Vivaldi version was installed
# during the build that produced this entry. If Vivaldi bumps version
# and the symlink shape changes, lint will surface a new warning and
# this entry will need updating to match.
L /var/opt/vivaldi/media-codecs-7.9 - - - - /var/opt/vivaldi/media-codecs-git-2026-02-09
