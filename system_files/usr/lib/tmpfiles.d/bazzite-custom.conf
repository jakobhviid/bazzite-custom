# Declare /var-side state created by image-baked packages so bootc lint
# stops complaining about "content in /var missing tmpfiles.d entries".
# Without these, /var content from the image isn't reliably re-created on
# bootc upgrades that recreate /var (since /var is not part of the image
# layer like /usr is — it's runtime state).
#
# /var/lib/dnf — created by dnf during package install in the build,
# needed for any future runtime dnf operations (rare on atomic systems
# but harmless to declare). The /var/lib/dnf/repos cache dir is removed
# at the end of build.sh — we don't want it baked in.
d /var/lib/dnf 0755 root root - -

# /var/opt/vivaldi — Vivaldi's RPM installs codec data here instead of /usr
# or /opt. Brittle bits hardcoded:
#   * version "7.9" in the symlink name
#   * dated git suffix "git-2026-02-09" in the target dir
# When Vivaldi bumps version and the symlink shape changes, lint will
# surface a new warning and these entries need updating to match.
#
# UNAVOIDABLE residual lint warning: the file
# /var/opt/vivaldi/media-codecs-git-2026-02-09/libffmpeg.so cannot be
# declared via tmpfiles.d in a way that restores its content (tmpfiles.d
# only declares existence + permissions, not bytes). The file lives in
# /var because that's where Vivaldi's RPM puts it — fundamentally an
# upstream packaging issue. In practice the file persists across bootc
# upgrades and Vivaldi works fine; we just can't silence lint on it.
d /var/opt/vivaldi 0755 root root - -
d /var/opt/vivaldi/media-codecs-git-2026-02-09 0755 root root - -
L /var/opt/vivaldi/media-codecs-7.9 - - - - /var/opt/vivaldi/media-codecs-git-2026-02-09
