# Declare /var-side state created by image-baked packages so bootc lint
# stops complaining about "content in /var missing tmpfiles.d entries".
# Without these, /var content from the image isn't reliably re-created on
# bootc upgrades that recreate /var (since /var is not part of the image
# layer like /usr is — it's runtime state).
#
# /var/lib/dnf — created by dnf during package install in the build,
# needed for any future runtime dnf operations (rare on atomic systems
# but harmless to declare). The /var/lib/dnf/repos cache dir is removed
# at the end of build.sh — we don't want it baked in.
d /var/lib/dnf 0755 root root - -

# Vivaldi NOTE: previously had entries for /var/opt/vivaldi here, because
# Vivaldi's RPM auto-downloads libffmpeg.so to /var/opt/vivaldi/media-codecs-*/.
# build.sh now relocates that file to /opt/vivaldi/lib/libffmpeg.so (immutable
# image layer, atomic version updates with the binary), and rm -rf's the
# /var/opt/vivaldi tree. So no Vivaldi entries needed here. If a future
# Vivaldi update changes the location it auto-downloads to, the tmpfiles
# warning will resurface and the build.sh relocation needs updating.
