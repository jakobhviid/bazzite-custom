# Declare 1Password's groups so bootc lint stops complaining about
# "/etc/group entry without corresponding systemd sysusers.d".
#
# 1Password's RPM creates these groups in its %post scriptlet but doesn't
# ship a sysusers.d declaration. With this file, systemd-sysusers will
# (re)create them with the same names and dynamic GIDs on bootc deploys
# where /etc may be reset, keeping file ownership stable across upgrades.
#
# Format: <type> <name> <id-or-dash> [GECOS] [home] [shell]
# `-` for ID means "auto-assign on first creation, preserve thereafter".
g onepassword -
g onepassword-cli -
